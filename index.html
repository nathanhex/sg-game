<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>游戏列表</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="index.css">
</head>
<body>
  <div class="bg-decor">
    <div class="cloud cloud-1"></div>
    <div class="cloud cloud-2"></div>
    <div class="cloud cloud-3"></div>
    <div class="candy-hill hill-1"></div>
    <div class="candy-hill hill-2"></div>
    <div class="candy-hill hill-3"></div>
  </div>

  <main class="index-main">
    <h1 class="index-title">选个游戏玩吧</h1>
    <div class="game-grid">
      <a href="games/tube-pour/" class="game-card" aria-label="试管倒水" style="animation-delay: 0.1s">
        <div class="game-card-preview" style="--preview-gradient: linear-gradient(160deg, #E8D4FF 0%, #FFE0F0 50%, #D4F1FF 100%);">
          <img src="games/tube-pour/cover.png" alt="" class="game-cover-img" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
          <span class="game-icon" aria-hidden="true">🧪</span>
        </div>
      </a>
      <a href="games/2048/" class="game-card" aria-label="合成2048" style="animation-delay: 0.15s">
        <div class="game-card-preview" style="--preview-gradient: linear-gradient(160deg, #FFE8B0 0%, #FFD4A0 50%, #E8C080 100%);">
          <img src="games/2048/cover.png" alt="" class="game-cover-img" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
          <span class="game-icon" aria-hidden="true">🔢</span>
        </div>
      </a>
      <a href="games/heibaiqi/" class="game-card" aria-label="黑白棋" style="animation-delay: 0.2s">
        <div class="game-card-preview" style="--preview-gradient: linear-gradient(160deg, #2D2D2D 0%, #4A4A4A 50%, #1A1A1A 100%);">
          <img src="games/heibaiqi/cover.png" alt="" class="game-cover-img" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
          <span class="game-icon" aria-hidden="true">⚫</span>
        </div>
      </a>
      <a href="games/jianfengchazhen/" class="game-card" aria-label="见缝插针" style="animation-delay: 0.25s">
        <div class="game-card-preview" style="--preview-gradient: linear-gradient(160deg, #FFB8B8 0%, #FF9090 50%, #E87070 100%);">
          <img src="games/jianfengchazhen/cover.png" alt="" class="game-cover-img" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
          <span class="game-icon" aria-hidden="true">📌</span>
        </div>
      </a>
      <a href="games/mofang/" class="game-card" aria-label="魔方" style="animation-delay: 0.3s">
        <div class="game-card-preview" style="--preview-gradient: linear-gradient(160deg, #FF6B6B 0%, #4ECDC4 30%, #FFE66D 60%, #95E1D3 100%);">
          <img src="games/mofang/cover.png" alt="" class="game-cover-img" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
          <span class="game-icon" aria-hidden="true">🧊</span>
        </div>
      </a>
      <a href="games/pukepaipeidui/" class="game-card" aria-label="翻牌" style="animation-delay: 0.35s">
        <div class="game-card-preview" style="--preview-gradient: linear-gradient(160deg, #C8E6C9 0%, #A5D6A7 50%, #81C784 100%);">
          <img src="games/pukepaipeidui/cover.png" alt="" class="game-cover-img" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
          <span class="game-icon" aria-hidden="true">🃏</span>
        </div>
      </a>
      <a href="games/qiejimu/" class="game-card" aria-label="切积木" style="animation-delay: 0.4s">
        <div class="game-card-preview" style="--preview-gradient: linear-gradient(160deg, #B39DDB 0%, #9575CD 50%, #7E57C2 100%);">
          <img src="games/qiejimu/cover.png" alt="" class="game-cover-img" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
          <span class="game-icon" aria-hidden="true">🧱</span>
        </div>
      </a>
      <a href="games/se/" class="game-card" aria-label="色彩敏感度" style="animation-delay: 0.45s">
        <div class="game-card-preview" style="--preview-gradient: linear-gradient(160deg, #E1BEE7 0%, #CE93D8 33%, #BA68C8 66%, #AB47BC 100%);">
          <img src="games/se/cover.png" alt="" class="game-cover-img" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
          <span class="game-icon" aria-hidden="true">🎨</span>
        </div>
      </a>
      <a href="games/yigedoubunengsi/" class="game-card" aria-label="不能死游戏" style="animation-delay: 0.5s">
        <div class="game-card-preview" style="--preview-gradient: linear-gradient(160deg, #FFCC80 0%, #FFB74D 50%, #FFA726 100%);">
          <img src="games/yigedoubunengsi/cover.png" alt="" class="game-cover-img" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
          <span class="game-icon" aria-hidden="true">🏃</span>
        </div>
      </a>
    </div>
  </main>
</body>
</html>
