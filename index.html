<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>游戏列表</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="index.css">
</head>
<body>
  <div class="bg-decor">
    <div class="cloud cloud-1"></div>
    <div class="cloud cloud-2"></div>
    <div class="cloud cloud-3"></div>
    <div class="candy-hill hill-1"></div>
    <div class="candy-hill hill-2"></div>
    <div class="candy-hill hill-3"></div>
  </div>

  <main class="index-main">
    <h1 class="index-title">选个游戏玩吧</h1>
    <div class="game-grid">
      <a href="games/tube-pour/" class="game-card" aria-label="试管倒水" style="animation-delay: 0.1s">
        <div class="game-card-preview" style="--preview-gradient: linear-gradient(160deg, #E8D4FF 0%, #FFE0F0 50%, #D4F1FF 100%);">
          <img src="games/tube-pour/cover.png" alt="" class="game-cover-img" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
          <span class="game-icon" aria-hidden="true">🧪</span>
        </div>
      </a>
      <!-- 后续新游戏在此追加 -->
    </div>
  </main>
</body>
</html>
