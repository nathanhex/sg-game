<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>生成游戏音效 WAV</title>
  <style>
    html, body { overflow: hidden; height: 100%; margin: 0; }
    body { font-family: sans-serif; max-width: 480px; margin: 0 auto; padding: 2rem 1rem; box-sizing: border-box; display: flex; flex-direction: column; min-height: 100%; }
    h1 { font-size: 1.25rem; }
    p { color: #555; }
    button { padding: 0.6rem 1.2rem; font-size: 1rem; cursor: pointer; margin: 0.25rem; }
    #log { margin-top: 1rem; padding: 0.75rem; background: #f5f5f5; border-radius: 8px; font-size: 0.9rem; min-height: 2rem; }
    .done { color: green; }
    .err { color: red; }
  </style>
</head>
<body>
  <h1>试管倒水游戏 — 音效生成器</h1>
  <p>点击下方按钮，用与游戏相同的程序逻辑生成 4 个 WAV 文件并下载到本地。可将文件放入 <code>games/tube-pour/sounds/</code> 目录供游戏使用。</p>
  <button type="button" id="btn-generate">生成并下载全部音效</button>
  <div id="log"></div>

  <script>
(function () {
  "use strict";

  var SAMPLE_RATE = 44100;

  function log(msg, isErr) {
    var el = document.getElementById("log");
    if (!el) return;
    var span = document.createElement("span");
    span.className = isErr ? "err" : "done";
    span.textContent = msg + (isErr ? "" : " ✓");
    span.style.display = "block";
    el.appendChild(span);
  }

  function floatTo16BitPCM(float32Array) {
    var buffer = new ArrayBuffer(float32Array.length * 2);
    var view = new DataView(buffer);
    var offset = 0;
    for (var i = 0; i < float32Array.length; i++) {
      var s = Math.max(-1, Math.min(1, float32Array[i]));
      view.setInt16(offset, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
      offset += 2;
    }
    return buffer;
  }

  function encodeWAV(channelData, numChannels, sampleRate) {
    var length = channelData.length * numChannels * 2;
    var buffer = new ArrayBuffer(44 + length);
    var view = new DataView(buffer);
    var offset = 0;

    function writeStr(str) {
      for (var i = 0; i < str.length; i++) {
        view.setUint8(offset++, str.charCodeAt(i));
      }
    }
    writeStr("RIFF");
    view.setUint32(offset, 36 + length, true); offset += 4;
    writeStr("WAVE");
    writeStr("fmt ");
    view.setUint32(offset, 16, true); offset += 4;
    view.setUint16(offset, 1, true); offset += 2;
    view.setUint16(offset, numChannels, true); offset += 2;
    view.setUint32(offset, sampleRate, true); offset += 4;
    view.setUint32(offset, sampleRate * numChannels * 2, true); offset += 4;
    view.setUint16(offset, numChannels * 2, true); offset += 2;
    view.setUint16(offset, 16, true); offset += 2;
    writeStr("data");
    view.setUint32(offset, length, true); offset += 4;

    var data = numChannels === 1 ? channelData : channelData[0];
    var pcm = floatTo16BitPCM(data);
    new Uint8Array(buffer).set(new Uint8Array(pcm), 44);
    return buffer;
  }

  function downloadBlob(blob, filename) {
    var a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = filename;
    a.click();
    URL.revokeObjectURL(a.href);
  }

  function renderTap(ctx) {
    var now = 0;
    var osc = ctx.createOscillator();
    var gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.type = "sine";
    osc.frequency.setValueAtTime(660, now);
    gain.gain.setValueAtTime(0, now);
    gain.gain.linearRampToValueAtTime(0.1, now + 0.01);
    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
    osc.start(now);
    osc.stop(now + 0.1);
  }

  function renderPour(ctx) {
    var now = 0;
    var osc1 = ctx.createOscillator();
    var osc2 = ctx.createOscillator();
    var gain = ctx.createGain();
    var filter = ctx.createBiquadFilter();
    filter.type = "lowpass";
    filter.frequency.value = 800;
    osc1.type = "sine";
    osc2.type = "sine";
    osc1.frequency.setValueAtTime(320, now);
    osc1.frequency.exponentialRampToValueAtTime(200, now + 0.2);
    osc2.frequency.setValueAtTime(240, now);
    osc2.frequency.exponentialRampToValueAtTime(160, now + 0.2);
    osc1.connect(filter);
    osc2.connect(filter);
    filter.connect(gain);
    gain.connect(ctx.destination);
    gain.gain.setValueAtTime(0, now);
    gain.gain.linearRampToValueAtTime(0.06, now + 0.03);
    gain.gain.linearRampToValueAtTime(0.02, now + 0.2);
    gain.gain.linearRampToValueAtTime(0, now + 0.28);
    osc1.start(now);
    osc2.start(now);
    osc1.stop(now + 0.28);
    osc2.stop(now + 0.28);
  }

  function renderSuccess(ctx) {
    var freqs = [523.25, 659.25, 783.99, 1046.5];
    var d = 0.12;
    for (var i = 0; i < freqs.length; i++) {
      var now = i * d;
      var o = ctx.createOscillator();
      var g = ctx.createGain();
      o.type = "sine";
      o.frequency.setValueAtTime(freqs[i], now);
      o.connect(g);
      g.connect(ctx.destination);
      g.gain.setValueAtTime(0, now);
      g.gain.linearRampToValueAtTime(0.12, now + 0.02);
      g.gain.linearRampToValueAtTime(0, now + (i + 1) * d + 0.05);
      o.start(now);
      o.stop(now + (i + 1) * d + 0.06);
    }
  }

  function renderError(ctx) {
    var now = 0;
    var osc = ctx.createOscillator();
    var gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.type = "sine";
    osc.frequency.setValueAtTime(220, now);
    osc.frequency.linearRampToValueAtTime(180, now + 0.12);
    gain.gain.setValueAtTime(0, now);
    gain.gain.linearRampToValueAtTime(0.06, now + 0.02);
    gain.gain.linearRampToValueAtTime(0, now + 0.18);
    osc.start(now);
    osc.stop(now + 0.18);
  }

  var presets = [
    { id: "tap", duration: 0.2, render: renderTap },
    { id: "pour", duration: 0.4, render: renderPour },
    { id: "success", duration: 0.6, render: renderSuccess },
    { id: "error", duration: 0.25, render: renderError }
  ];

  document.getElementById("btn-generate").addEventListener("click", function () {
    var logEl = document.getElementById("log");
    if (logEl) logEl.innerHTML = "";
    log("开始生成…");

    var i = 0;
    function next() {
      if (i >= presets.length) {
        log("全部完成。请将下载的 4 个 WAV 放入 games/tube-pour/sounds/ 目录。");
        return;
      }
      var p = presets[i];
      var length = Math.ceil(p.duration * SAMPLE_RATE);
      var ctx = new (window.OfflineAudioContext || window.webkitOfflineAudioContext)(1, length, SAMPLE_RATE);
      p.render(ctx);
      ctx.startRendering().then(function (buffer) {
        var ch = buffer.getChannelData(0);
        var wav = encodeWAV(ch, 1, SAMPLE_RATE);
        downloadBlob(new Blob([wav], { type: "audio/wav" }), p.id + ".wav");
        log("已下载 " + p.id + ".wav");
        i++;
        next();
      }).catch(function (e) {
        log("生成 " + p.id + " 失败: " + e.message, true);
        i++;
        next();
      });
    }
    next();
  });
})();
  </script>
</body>
</html>
