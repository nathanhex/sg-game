<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <title>见缝插针</title>
  <meta name="viewport" content="width=device-width,height=device-height,user-scalable=no,initial-scale=1.0,maximum-scale=1.0,minimum-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet" type="text/css">
</head>
<body>
  <div class="bg-decor">
    <div class="cloud cloud-1"></div>
    <div class="cloud cloud-2"></div>
    <div class="cloud cloud-3"></div>
    <div class="candy-hill hill-1"></div>
    <div class="candy-hill hill-2"></div>
    <div class="candy-hill hill-3"></div>
  </div>
  <div class="container">
    <!-- 游戏中顶部栏：仅 canvas 显示时可见 -->
    <div class="game-top-bar" id="gameTopBar" aria-hidden="true">
      <button type="button" class="game-top-bar__exit" id="btnExitToStart">退出到开始</button>
      <a href="../../index.html" class="game-top-bar__back">返回列表</a>
    </div>
    <canvas style="display:none;" id="stage"></canvas>
    <div id="begin">
      <section class="center-box start-screen">
        <header class="start-screen-header">
          <h1 class="title">见缝插针</h1>
          <a href="../../index.html" class="back-to-list" aria-label="返回游戏列表">返回列表</a>
        </header>
        <p class="game-intro">把针插进转盘，别撞到已有的针！</p>
        <div class="start-button-wrap">
          <div class="button" role="button" tabindex="0">
            <span id="txtAr" class="txt-ar"></span>
            <span class="text"></span>
          </div>
        </div>
        <div class="op">
          <a id="btnFW" style="display: none;" href="javascript:;"><img data-capture="1" src="img/btn_fw.png" alt=""></a>
          <span id="btnReset" role="button" tabindex="0">重置关卡</span>
          <span id="btnReset2" role="button" tabindex="0">跳到关卡</span>
          <div id="tip" style="display:none;"></div>
        </div>
      </section>
      <section id="wxArrow" style="display: none;">
        <div style="position:absolute;width:100%;height:100%;opacity: 0.7;background-color:#000"></div>
        <img style="position: absolute;right:25px;" src="img/arrow.png" alt="">
      </section>
    </div>
  </div>
  <script src="js/jweixin-1.0.0.js"></script>
  <script src="js/index.js"></script>
  <script>
(function() {
  var stage = document.getElementById("stage");
  var begin = document.getElementById("begin");
  var bar = document.getElementById("gameTopBar");
  var btnExit = document.getElementById("btnExitToStart");
  function updateBar() {
    var visible = stage && stage.style.display !== "none";
    if (bar) {
      bar.classList.toggle("is-visible", !!visible);
      bar.setAttribute("aria-hidden", !visible);
    }
  }
  function exitToStart() {
    if (stage) stage.style.display = "none";
    if (begin) begin.style.display = "";
    updateBar();
  }
  if (btnExit) btnExit.addEventListener("click", exitToStart);
  var obs = stage && window.MutationObserver ? new MutationObserver(updateBar) : null;
  if (obs && stage) {
    obs.observe(stage, { attributes: true, attributeFilter: ["style"] });
  }
  setInterval(updateBar, 800);
})();
  </script>
</body>
</html>
